<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <style>
    .weatherIcon{
        font-size: 80px;
        margin:10px;
        }

      .whitecloud{
        color: white;
      }
      .clouds {
        color: orange;
      }

      .top-cards {
        display: grid;
        grid-template-columns: repeat(7, 2fr);
        gap: 40px;
        width: 800px;
    }
    
   
    .card-box {
        background: rgba(73, 71, 71, 0.2);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        transition: 0.3s;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        
    }

    .card-box:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.3);
  }


    .card-box i {
      font-size: 28px;
      margin-bottom: 10px;
  }

    .temp {
      color: #ff4d4d;
  }

  .rain {
      color: #4da6ff;
  }

  .humidity {
      color: #00ccff;
  }

  .wind {
      color: #00e6ac;
  }

  .min{
      color: red;
  }

  .max{
      color: blue
  }

  .alert {
      color: #ffd633;
      margin-top: none;
  }

    .card-box h6 {
      margin: 5px 0;
      font-weight: 500;
  }

  .card-box h3 {
      margin: 0;
      font-weight: bold;
      width: 130px;
  }
  </style>
 
  <body>
    

    <h1 class="text-center mt-5">🌤 Weather Application</h1>

    <div class="container p-5 w-25  d-flex">
    
        <input type="text" id="cityInput" placeholder="Enter City"/>
        <button class="btn  btn-primary ms-2" id="getWeatherBTN">Search</button>
    </div>

    <div class="container">
        <div id="showWeather"></div>
    </div>

    <script>
      document.body.style.backgroundImage = "url('./assets/cloud.jpg')"
      document.body.style.backgroundSize = "cover"
     

    </script>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
